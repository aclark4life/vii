name: Social Media

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to announce (e.g., v0.1.0)'
        required: true
        type: string
      release_url:
        description: 'Release URL (optional)'
        required: false
        type: string
        default: 'https://github.com/aclark4life/vii/releases'

permissions:
  contents: read

jobs:
  post-to-social:
    name: Post to Social Media
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version info
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
            echo "url=${{ github.event.release.html_url }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "url=${{ github.event.inputs.release_url }}" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog for current version
        id: changelog
        run: |
          # Extract the changelog section for this version
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix

          # Get content between this version and the next version header
          CHANGELOG=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md | head -20)

          # Escape for GitHub Actions output
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post to Twitter
        if: env.TWITTER_API_KEY != ''
        uses: nearform-actions/github-action-notify-twitter@v1
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        with:
          message: |
            🚀 vii ${{ steps.version.outputs.tag }} released!

            ${{ steps.changelog.outputs.content }}

            pip install vii
            ${{ steps.version.outputs.url }}
          twitter-app-key: ${{ secrets.TWITTER_API_KEY }}
          twitter-app-secret: ${{ secrets.TWITTER_API_SECRET }}
          twitter-access-token: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          twitter-access-token-secret: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}

      - name: Post to Fosstodon
        if: env.MASTODON_ACCESS_TOKEN != ''
        uses: cbrgm/mastodon-github-action@v2
        env:
          MASTODON_URL: "https://fosstodon.org"
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
        with:
          message: |
            🚀 vii ${{ steps.version.outputs.tag }} released!

            ${{ steps.changelog.outputs.content }}

            pip install vii
            ${{ steps.version.outputs.url }}

            #Python #CLI #OpenSource #Vim
          visibility: "public"
